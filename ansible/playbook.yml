---
# Thin Ansible orchestrator for EC2.
# All runtime-specific behavior lives in `runtimes/<runtime>/*.yml.j2` so that
# editing one language's playbook (e.g. python) cannot affect any other.
- name: Deploy cspringghcr8
  hosts: all
  become: true
  gather_facts: yes
  vars:
    ansible_ssh_retries: 5
    app_dir: /opt/app
    app_port: 8080
    project: 'cspringghcr8'
    web_server: 'nginx'
    docker_image: '{{ docker_image }}'
    ghcr_actor: '{{ ghcr_actor }}'
    ghcr_token: '{{ ghcr_token }}'
    java_version: '21'

  tasks:
    # ── System update ──────────────────────────────────────────────────────────
    - name: Wait for SSH to be fully ready
      wait_for_connection:
        timeout: 120

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      retries: 3
      delay: 10
      register: _apt_update
      until: _apt_update is succeeded



    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Configure Nginx reverse proxy
      copy:
        dest: /etc/nginx/sites-available/app
        content: |
          server {
            listen 80;
            server_name _;
            location / {
              proxy_pass http://127.0.0.1:{{ app_port }};
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_read_timeout 120s;
            }
          }

    - name: Enable Nginx site
      file:
        src: /etc/nginx/sites-available/app
        dest: /etc/nginx/sites-enabled/app
        state: link

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent


    # ── App directory ─────────────────────────────────────────────────────────
    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

    # ── Docker (GHCR) ─────────────────────────────────────────────────────────
    - name: Install Docker
      shell: |
        curl -fsSL https://get.docker.com | sh
      args:
        executable: /bin/bash
        creates: /usr/bin/docker

    - name: Login to GHCR
      shell: |
        echo "{{ ghcr_token }}" | docker login ghcr.io -u "{{ ghcr_actor }}" --password-stdin
      args:
        executable: /bin/bash
      no_log: true

    - name: Pull image from GHCR
      shell: docker pull "{{ docker_image }}"
      args:
        executable: /bin/bash

    # ── Resolve Spring-shaped JDBC connection details from deploy vars ───────
    # The deploy pipeline passes DATABASE_URL in scheme-prefixed form
    # (postgres://user:pass@host:5432/db) via --extra-vars. Spring's JDBC
    # driver wants "jdbc:postgresql://host:5432/db" plus separate username and
    # password. This block runs the translation once and stores the result in
    # three Ansible facts so the env-file writer and the `docker run`
    # invocation can consume them without duplicating the parsing logic.
    #
    # Variables come from --extra-vars (deploy_database_url, etc.) which the
    # workflow's "Run Ansible playbook" step injects from the provision job's
    # outputs. We deliberately do NOT use lookup('env', ...) here — that
    # silently returns empty when env propagation between job steps breaks,
    # which produces a hostless JDBC URL and a misleading "localhost refused"
    # crash loop. Extra-vars guarantee the value reaches the play.
    # First task: derive a sanitized diagnostic (URL with password redacted +
    # whether each piece is empty). This task does NOT use no_log, so if it
    # fails its stderr is visible in the GHA log. The actual secret-bearing
    # JSON emission happens in the second task below.
    - name: Validate deploy DB inputs (sanitized — password redacted)
      shell: |
        set -e
        DB_URL_RAW="{{ deploy_database_url | default('', true) }}"
        DB_USER="{{ deploy_db_username | default('appuser', true) }}"
        DB_NAME="{{ deploy_db_name | default(project | replace('-', '_') + 'db', true) }}"
        # Build a sanitized copy of the URL by replacing :PASS@ with :REDACTED@
        DB_URL_SAFE="$(printf '%s' "$DB_URL_RAW" \
          | sed -E 's|(://[^:/@]+:)[^@]+(@)|\1REDACTED\2|')"
        echo "deploy_database_url (sanitized) = ${DB_URL_SAFE:-<empty>}"
        echo "deploy_db_username             = ${DB_USER:-<empty>}"
        echo "deploy_db_name                 = ${DB_NAME:-<empty>}"
        echo "deploy_db_password is set      = $([ -n '{{ deploy_db_password | default("", true) }}' ] && echo yes || echo no)"
        if [ -z "$DB_URL_RAW" ]; then
          echo "FATAL: install_db=rds but deploy_database_url is empty." >&2
          echo "Likely cause: GHA 'Get RDS endpoint' step did not populate" >&2
          echo "provision.outputs.database_url. Check that the RDS instance" >&2
          echo "is tagged Project=<project_name> and is in AWS_REGION." >&2
          exit 1
        fi
        # Probe the host to confirm the URL has one.
        HOSTPROBE="$(printf '%s' "$DB_URL_RAW" \
          | sed -E 's|^[a-z]+://([^/]+)/?.*|\1|' \
          | sed -E 's|^[^@]*@||' \
          | sed -E 's|:.*$||')"
        if [ -z "$HOSTPROBE" ]; then
          echo "FATAL: deploy_database_url has no host (got: ${DB_URL_SAFE})." >&2
          exit 1
        fi
      args:
        executable: /bin/bash
      changed_when: false

    - name: Resolve Spring JDBC URL + credentials from deploy vars
      shell: |
        set -e
        DB_URL_RAW="{{ deploy_database_url | default('', true) }}"
        DB_USER="{{ deploy_db_username | default('appuser', true) }}"
        DB_PASS="{{ deploy_db_password | default('', true) }}"
        DB_NAME="{{ deploy_db_name | default(project | replace('-', '_') + 'db', true) }}"

        # Strip the host:port out first so we can validate it before trusting
        # the URL. A DATABASE_URL like "postgresql://user:pass@:5432/db" (empty
        # host) is worse than no URL at all — the driver silently falls back to
        # localhost and we get a confusing "Connection refused on 5432" error.
        HOSTPORT=""
        if [ -n "$DB_URL_RAW" ]; then
          REST_PROBE="$(echo "$DB_URL_RAW" | sed -E 's|^[a-z]+://([^/]+)/?.*|\1|')"
          HOSTPORT_PROBE="$(echo "$REST_PROBE" | sed -E 's|^[^@]*@||')"
          HOST_ONLY="$(echo "$HOSTPORT_PROBE" | sed -E 's|:.*$||')"
          [ -n "$HOST_ONLY" ] && HOSTPORT="$HOSTPORT_PROBE"
        fi
        if [ -n "$HOSTPORT" ]; then
          PROTO="$(echo "$DB_URL_RAW" | sed -E 's|^([a-z]+)://.*|\1|')"
          REST="$(echo "$DB_URL_RAW" | sed -E 's|^[a-z]+://([^/]+)/(.+)$|\1|')"
          DBPART="$(echo "$DB_URL_RAW" | sed -E 's|^[a-z]+://([^/]+)/(.+)$|\2|')"
          if echo "$REST" | grep -q '@'; then
            EMBED_USER="$(echo "$REST" | sed -E 's|^([^:@]+).*|\1|')"
            EMBED_PASS="$(echo "$REST" | sed -E 's|^[^:]+:([^@]+)@.*|\1|')"
            [ -z "$DB_USER" ] && DB_USER="$EMBED_USER"
            [ -z "$DB_PASS" ] && DB_PASS="$EMBED_PASS"
          fi
          [ -n "$DBPART" ] && DB_NAME="$DBPART"
          case "$PROTO" in
            postgres|postgresql) JDBC="jdbc:postgresql://$HOSTPORT/$DB_NAME" ;;
            mysql)               JDBC="jdbc:mysql://$HOSTPORT/$DB_NAME" ;;
            *)                   JDBC="jdbc:$PROTO://$HOSTPORT/$DB_NAME" ;;
          esac
        else
          # No usable DATABASE_URL was passed in.
          # The validate task above should already have failed; this is a
          # last-line guard in case it was somehow skipped.
          echo "FATAL: deploy_database_url was empty for an install_db=rds deploy" >&2
          exit 1
        fi
        # Emit the resolved values as JSON for the next task to pick up as facts.
        printf '{"spring_datasource_url":"%s","spring_datasource_username":"%s","spring_datasource_password":"%s"}\n' \
               "$JDBC" "$DB_USER" "$DB_PASS"
      args:
        executable: /bin/bash
      register: _jdbc_resolve
      no_log: true
      changed_when: false

    - name: Store JDBC details as facts
      set_fact:
        spring_datasource_url:      "{{ (_jdbc_resolve.stdout | from_json).spring_datasource_url }}"
        spring_datasource_username: "{{ (_jdbc_resolve.stdout | from_json).spring_datasource_username }}"
        spring_datasource_password: "{{ (_jdbc_resolve.stdout | from_json).spring_datasource_password }}"
      no_log: true

    # Build the docker run env-var list. We use --env-file pointed at a file
    # we generate just-in-time so passwords never appear on the command line
    # (which would land in /var/log + `docker inspect`).
    - name: Write docker env file
      copy:
        dest: "/opt/app.env"
        mode: '0600'
        content: |
          PORT={{ app_port }}
          SPRING_DATASOURCE_URL={{ spring_datasource_url }}
          SPRING_DATASOURCE_USERNAME={{ spring_datasource_username }}
          SPRING_DATASOURCE_PASSWORD={{ spring_datasource_password }}
          SPRING_JPA_HIBERNATE_DDL_AUTO=update
          SERVER_PORT={{ app_port }}
          SPRING_PROFILES_ACTIVE=production
      no_log: true

    - name: Run container
      shell: |
        docker rm -f {{ project }} 2>/dev/null || true
        docker run -d \
          --name {{ project }} \
          --restart always \
          --network host \
          --env-file /opt/app.env \
          "{{ docker_image }}"
      args:
        executable: /bin/bash

    - name: Reload and start web server
      service:
        name: "{{ 'apache2' if (web_server or 'nginx').lower() == 'apache' else 'nginx' }}"
        state: reloaded
        enabled: yes

  handlers:
    - name: Restart app
      shell: |
        docker rm -f {{ project }} 2>/dev/null || true
        docker run -d --name {{ project }} --restart always --network host \
          --env-file /opt/app.env "{{ docker_image }}"
      args:
        executable: /bin/bash
